name: build

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    runs-on: windows-latest
    env:
      DOTNET_NOLOGO: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"
      - uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-
      - name: Restore
        run: dotnet restore DcConcretos.sln
      - name: Build
        run: dotnet build DcConcretos.sln -c Release --no-restore
      - name: Test
        run: dotnet test DcConcretos.sln -c Release --no-build --verbosity normal

  python-cli:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: batch-cli
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install CLI (dev)
        run: pip install -e ".[dev]"
      - name: Pytest
        run: pytest -q
