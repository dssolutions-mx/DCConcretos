name: build

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"
      - name: Restore
        run: dotnet restore DcConcretos.sln
      - name: Build
        run: dotnet build DcConcretos.sln -c Release --no-restore
      - name: Test
        run: dotnet test DcConcretos.sln -c Release --no-build --verbosity normal
